# PODMAN_COMPOSE example — a small web-app stack.
#
# Topology:
#   AppNet  ── public-facing podman network (Web, Api, Cache attach to it)
#   DbNet   ── backend podman network        (Api, Db attach to it)
#
#   Web   (nginx)    on AppNet              → depends on Api
#   Api   (app)      on AppNet + DbNet      → depends on Db, Cache
#   Cache (redis)    on AppNet
#   Db    (postgres) on DbNet               → FailureBehavior=Restart
#
# Behaviors exercised:
#   - Two Networks with Network_members reconciliation against Service.Networks
#   - Service-to-Service Depends chain (Web → Api → {Db, Cache})
#   - FailureBehavior=Restart on Db (Restart= + StartLimit* directives emitted)
#   - DependencyBehavior=Cascade on Api (PartOf= edges to its parents)

AppNet:
  Name: app-net
  Type: Network

DbNet:
  Name: db-net
  Type: Network

Db:
  Name: db-svc
  Type: Service
  Image: docker.io/library/postgres:16
  ContainerName: db-svc
  Networks:
    - DbNet
  Environment:
    POSTGRES_PASSWORD: changeme
    POSTGRES_DB: appdb
  Volumes:
    - db-data:/var/lib/postgresql/data
  FailureBehavior: Restart

Cache:
  Name: cache-svc
  Type: Service
  Image: docker.io/library/redis:7
  ContainerName: cache-svc
  Networks:
    - AppNet

Api:
  Name: api-svc
  Type: Service
  Image: docker.io/library/python:3.12-slim
  ContainerName: api-svc
  Depends:
    - Db
    - Cache
  Networks:
    - AppNet
    - DbNet
  Ports:
    - 8080:8080
  Environment:
    DB_HOST: db-svc
    CACHE_HOST: cache-svc
  Command:
    - python
    - -m
    - http.server
    - "8080"
  Working_dir: /srv
  DependencyBehavior: Cascade

Web:
  Name: web-svc
  Type: Service
  Image: docker.io/library/nginx:1.27
  ContainerName: web-svc
  Depends:
    - Api
  Networks:
    - AppNet
  Ports:
    - 80:80
  FailureBehavior: Restart
