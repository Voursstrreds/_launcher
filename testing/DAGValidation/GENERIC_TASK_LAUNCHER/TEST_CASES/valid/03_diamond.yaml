# Diamond: A depends on B and C. B and C both depend on D.
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
    - C

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - D

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Depends:
    - D

D:
  Name: d
  Type: Entry
  Path: /usr/bin/d
