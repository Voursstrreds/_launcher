# Deps and groups together, no conflict.
# A depends on B. Both belong to G1. G1 depends on C.
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
  Group:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Group:
    - G1

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c

G1:
  Name: g1
  Type: Group
  Depends:
    - C
