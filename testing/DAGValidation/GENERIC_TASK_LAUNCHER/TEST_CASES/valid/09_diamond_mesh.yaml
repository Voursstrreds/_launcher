# 22 nodes. Multiple overlapping diamonds with cross-group membership.
# Tier 0: N1
# Tier 1: N2 N3 N4 N5  (all depend on N1)
# Tier 2: N6 N7 N8 N9  (each depends on 2 from tier 1)
# Tier 3: N10 N11 N12   (each depends on 2 from tier 2)
# Tier 4: N13 N14       (each depends on 2 from tier 3)
# Tier 5: N15            (depends on N13 and N14)
# Groups: GA has tier 1+2, GB has tier 3+4, GC has tier 5.
#         GA→GB→GC.  Extra group GX has N1 and N15 (bookends).
N1:
  Name: n1
  Type: Entry
  Path: /usr/bin/n1

