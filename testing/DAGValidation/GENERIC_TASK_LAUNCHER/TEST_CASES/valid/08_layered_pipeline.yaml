# 25 nodes. 5 layers, each layer depends on the previous layer.
# Layer 0 (sources):  S1 S2 S3 S4 S5
# Layer 1 (process):  P1 P2 P3 P4 P5  — each depends on all of layer 0
# Layer 2 (reduce):   R1 R2 R3        — each depends on all of layer 1
# Layer 3 (output):   O1 O2           — each depends on all of layer 2
# Groups: GL0 contains layer 0, GL1 contains layer 1,
#         GL2 contains layer 2, GL3 contains layer 3.
#         GL0→GL1→GL2→GL3 (nested group chain).
S1:
  Name: s1
  Type: Entry
  Path: /usr/bin/s1
  Group:
    - GL0

S2:
  Name: s2
  Type: Entry
  Path: /usr/bin/s2
  Group:
    - GL0

S3:
  Name: s3
  Type: Entry
  Path: /usr/bin/s3
  Group:
    - GL0

