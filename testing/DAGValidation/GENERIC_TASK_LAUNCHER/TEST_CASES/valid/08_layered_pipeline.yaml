  Type: Entry
  Path: /usr/bin/s4
  Group:
    - GL0

S5:
  Name: s5
  Type: Entry
  Path: /usr/bin/s5
  Group:
    - GL0

P1:
  Name: p1
  Type: Entry
  Path: /usr/bin/p1
  Depends:
    - S1
    - S2
    - S3
    - S4
    - S5
  Group:
    - GL1

