# Mixed: A depends on B, both belong to G1. G1 depends on C.
# A: depends=[B], after=[B], before=[], group=[G1], members=[]
# B: depends=[], after=[], before=[A], group=[G1], members=[]
# C: depends=[], after=[], before=[G1], group=[], members=[]
# G1: depends=[C], after=[C], before=[], group=[], members=[A, B]
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
  Group:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Group:
    - G1

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c

G1:
  Name: g1
  Type: Group
  Depends:
    - C
