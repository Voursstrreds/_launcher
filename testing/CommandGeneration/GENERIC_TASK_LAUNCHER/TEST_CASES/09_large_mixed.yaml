# 12 nodes: 8 entries, 2 groups with nested structure.
# Deps: Aâ†’B, Aâ†’C, Bâ†’D, Câ†’D, Dâ†’E, Fâ†’E.
# Groups: A,B,C in G1. D,E,F in G2. G1 in G2.
# H and I are standalone with extra args.
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
    - C
  Group:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - D
  Group:
    - G1

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Depends:
    - D
  Group:
    - G1

D:
