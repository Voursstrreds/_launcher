# Aâ†’Bâ†’C chain. Each has extra args.
# command_string for A: '/usr/bin/a --mode=fast'
# command_string for B: '/usr/bin/b --retry 3'
# command_string for C: '/usr/bin/c --daemon'
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
  Mode: --mode=fast

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - C
  Retry: --retry
  Count: "3"

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Flag: --daemon
