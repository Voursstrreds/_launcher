# A, B in G1. G1 in G2.
# A: group=[G1], members=[]
# B: group=[G1], members=[]
# G1: group=[G2], members=[A, B], unit_file_name='g1.target'
# G2: group=[], members=[G1], unit_file_name='g2.target'
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Group:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Group:
    - G1

G1:
  Name: g1
  Type: Group
  Group:
    - G2

G2:
  Name: g2
  Type: Group
