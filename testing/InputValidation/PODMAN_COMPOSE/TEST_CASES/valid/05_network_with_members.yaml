Web:
  Name: web-svc
  Type: Service
  Image: docker.io/library/nginx:latest
  ContainerName: web-svc

Db:
  Name: db-svc
  Type: Service
  Image: docker.io/library/postgres:16
  ContainerName: db-svc

AppNet:
  Name: app-net
  Type: Network
  Network_members:
    - Web
    - Db
  FailureBehavior: Restart
