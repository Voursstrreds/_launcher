# Entry with FailureBehavior: Restart — valid. Children should pick up PartOf;
# this entry itself gets the Restart-block in the unit file (tested separately).
Program1:
  Name: program1
  Type: Entry
  Path: /usr/bin/echo
  FailureBehavior: Restart

Program2:
  Name: program2
  Type: Entry
  Path: /usr/bin/true
  Depends: Program1
