# Unified cycle: A member of G1, G1 depends on A.
# Dep DAG: G1‚ÜíA ‚Äî acyclic. Group DAG: A‚ÜíG1 ‚Äî acyclic.
# Unified: G1‚ÜíA (dep-before: A before G1), A‚ÜíG1 (group: A before G1).
# Wait ‚Äî that is the same direction. Let me make it cycle properly.
# A depends on G1, A member of G1.
# Dep: A‚ÜíG1 (A after G1). Group: A‚ÜíG1 (A before G1, member).
# Unified before[A] = before_map[A] + group_of[A] = [] + [G1].
# Unified before[G1] = before_map[G1] + group_of[G1] = [A] + [].
# Cycle: A‚ÜíG1‚ÜíA.
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - G1
  Group:
    - G1

G1:
  Name: g1
  Type: Group
