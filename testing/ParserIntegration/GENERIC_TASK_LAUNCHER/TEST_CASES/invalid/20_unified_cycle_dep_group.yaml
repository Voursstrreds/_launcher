# Unified cycle: A in G1, G1 depends on B, B depends on A.
# Dep DAG: G1→B, B→A — acyclic (A before B before G1).
# Group DAG: A→G1 — acyclic (A before G1).
# Unified before:
#   before_map = {B: [G1], A: [B]}  (inverted deps)
#   group_of = {A: [G1]}
#   unified_before[A] = [B] + [G1] = [B, G1]
#   unified_before[B] = [G1] + [] = [G1]
#   unified_before[G1] = [] + [] = []
# Still no cycle. Need: G1 must come before something in the chain.
#
# Actual cycle: A depends on G1, B in G1, B depends on A.
# Dep: A→G1, B→A. before_map = {G1: [A], A: [B]}.
# Group: B in G1. group_of = {B: [G1]}.
# unified_before[A] = [B] + [] = [B]
# unified_before[B] = [] + [G1] = [G1]
# unified_before[G1] = [A] + [] = [A]
# Path: A→B→G1→A — cycle!
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - A
  Group:
    - G1

G1:
  Name: g1
  Type: Group
