# Both sides declared: A declares Group: G1, G1 declares Members: A.
# Reconciliation should not duplicate.
# Expected group_of:   A -> [G1], G1 -> []
# Expected members_of: G1 -> [A], A -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Group:
    - G1

G1:
  Name: g1
  Type: Group
  Members:
    - A
