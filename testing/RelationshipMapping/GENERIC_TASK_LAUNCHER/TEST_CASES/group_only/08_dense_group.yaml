# Dense: every entry belongs to every group, declared from mixed sides.
# A: Group [G1, G2].  B: Group [G1].  G2 Members: [B].
# After reconciliation:
# Expected group_of:   A -> [G1, G2], B -> [G1, G2], G1 -> [], G2 -> []
# Expected members_of: G1 -> [A, B], G2 -> [A, B], A -> [], B -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Group:
    - G1
    - G2

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Group:
    - G1

G1:
  Name: g1
  Type: Group

G2:
  Name: g2
  Type: Group
  Members:
    - B
