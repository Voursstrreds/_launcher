# G1 is a member of G2 (group inside a group).
# A is a member of G1 (declared from member side).
# Expected group_of:   A -> [G1], G1 -> [G2], G2 -> []
# Expected members_of: G1 -> [A], G2 -> [G1], A -> [], G2 contains G1 only.
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Group:
    - G1

G1:
  Name: g1
  Type: Group
  Group:
    - G2

G2:
  Name: g2
  Type: Group
