# A depends on B. G1 declares Members: [A, B] (members don't declare Group).
# Expected before:     B -> [A], A -> [], G1 -> []
# Expected group_of:   A -> [G1], B -> [G1], G1 -> []
# Expected members_of: G1 -> [A, B], A -> [], B -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b

G1:
  Name: g1
  Type: Group
  Members:
    - A
    - B
