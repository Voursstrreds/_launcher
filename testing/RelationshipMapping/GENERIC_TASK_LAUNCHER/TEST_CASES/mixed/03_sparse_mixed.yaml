# Sparse: many nodes, few connections.
# C depends on A. B belongs to G1 (via Group field). Rest disconnected.
# Expected before:     A -> [C], B -> [], C -> [], D -> [], G1 -> []
# Expected group_of:   B -> [G1], A -> [], C -> [], D -> [], G1 -> []
# Expected members_of: G1 -> [B], A -> [], B -> [], C -> [], D -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Group:
    - G1

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Depends:
    - A

D:
  Name: d
  Type: Entry
  Path: /usr/bin/d

G1:
  Name: g1
  Type: Group
