# A depends on B, A belongs to G1.
# Expected before:     B -> [A], A -> [], G1 -> []
# Expected group_of:   A -> [G1], B -> [], G1 -> []
# Expected members_of: G1 -> [A], A -> [], B -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a
  Depends:
    - B
  Group:
    - G1

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b

G1:
  Name: g1
  Type: Group
