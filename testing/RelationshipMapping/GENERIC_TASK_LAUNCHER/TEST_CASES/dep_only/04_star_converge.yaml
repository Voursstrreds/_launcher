# B, C, D all depend on A (star: all converge on one root).
# Expected before: A -> [B, C, D], B -> [], C -> [], D -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - A

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Depends:
    - A

D:
  Name: d
  Type: Entry
  Path: /usr/bin/d
  Depends:
    - A
