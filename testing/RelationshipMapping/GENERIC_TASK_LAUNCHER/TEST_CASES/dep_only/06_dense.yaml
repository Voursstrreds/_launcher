# Dense: every instance depends on all earlier ones.
# A: no deps. B: depends on A. C: depends on A, B. D: depends on A, B, C.
# Expected before: A -> [B, C, D], B -> [C, D], C -> [D], D -> []
A:
  Name: a
  Type: Entry
  Path: /usr/bin/a

B:
  Name: b
  Type: Entry
  Path: /usr/bin/b
  Depends:
    - A

C:
  Name: c
  Type: Entry
  Path: /usr/bin/c
  Depends:
    - A
    - B

D:
  Name: d
  Type: Entry
  Path: /usr/bin/d
  Depends:
    - A
    - B
    - C
