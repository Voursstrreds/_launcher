# Case 10 — Three-deep chain with different DependencyBehavior per instance.
# Chain shape: Top ← Middle (Ignore) ← Bottom (Cascade).
# Restart at the top should NOT cascade (middle = Ignore, no PartOf).
# Bottom only follows middle restarts, not top restarts.
# Verifies decisions are local to each child (per-child, not per-edge).
Top:
  Name: si-10-top
  Type: Entry
  Path: /home/mehmet/Mehmet/Tez/PROJECT/Utilities/SystemdUnitsTesting/bin/generic-unit
  Arg1: infinite

Middle:
  Name: si-10-middle
  Type: Entry
  Path: /home/mehmet/Mehmet/Tez/PROJECT/Utilities/SystemdUnitsTesting/bin/generic-unit
  Arg1: infinite
  Depends: Top
  DependencyBehavior: Ignore

Bottom:
  Name: si-10-bottom
  Type: Entry
  Path: /home/mehmet/Mehmet/Tez/PROJECT/Utilities/SystemdUnitsTesting/bin/generic-unit
  Arg1: infinite
  Depends: Middle
  DependencyBehavior: Cascade
